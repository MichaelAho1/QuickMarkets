version: '3.8'

services:
  timer-service:
    build:
      context: ./server
      dockerfile: Dockerfile.timer
    environment:
      - SECRET_KEY=${SECRET_KEY}
      - DEBUG=${DEBUG}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
    command: >
      sh -c "python manage.py migrate --settings=server.settings &&
             python start_timer.py"
    restart: unless-stopped
    env_file:
      - .env
