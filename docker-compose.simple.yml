version: '3.8'

services:
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile.simple
    ports:
      - "8000:8000"
    env_file:
      - .env
    command: >
      sh -c "python manage.py migrate --settings=server.settings.production &&
             python manage.py collectstatic --noinput --settings=server.settings.production &&
             gunicorn --bind 0.0.0.0:8000 --workers 2 server.wsgi:application"

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile.simple
    ports:
      - "80:80"
    env_file:
      - .env
    depends_on:
      - backend

