version: '3.8'

services:
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile.simple
    ports:
      - "8000:8000"
    environment:
      - SECRET_KEY=${SECRET_KEY}
      - DEBUG=${DEBUG}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
    command: >
      sh -c "python manage.py migrate --settings=server.settings &&
             gunicorn --bind 0.0.0.0:8000 --workers 2 server.wsgi:application"

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile.simple
    ports:
      - "80:80"
      - "443:443"
    env_file:
      - .env
    depends_on:
      - backend

